name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: write

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Lint, Type Check, Build, and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: lambda/go-image-processor/go.mod
          cache-dependency-path: lambda/go-image-processor/go.sum

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Minimal env vars needed for build (not for runtime)
          STORAGE_PATH: ./storage
          AUTH_SECRET: test-secret-key-at-least-32-characters-long-min
          ADMIN_PASSWORD_HASH: $2b$10$test
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          DYNAMODB_ENDPOINT: http://localhost:8000

      - name: Run tests
        run: npm run test

      - name: Build Lambda package
        run: npm run build:lambda

      - name: Install libvips for Go tests
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Run Go tests
        run: npm run test:go

      - name: Build Go Lambda container
        run: npm run build:lambda:go

      - name: Install CDK dependencies
        run: npm ci
        working-directory: photo-profile-cdk

      - name: Run CDK tests
        run: npm test
        working-directory: photo-profile-cdk

      - name: Synthesize CDK template
        run: npx cdk synth
        working-directory: photo-profile-cdk

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
